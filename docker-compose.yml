name: kg

services:

  # ── Neo4j Enterprise（掛載現有資料，避免重新建立）──────────────────────────
  neo4j:
    image: neo4j:5.26-enterprise
    container_name: kg-neo4j
    ports:
      - "7689:7687"   # Bolt（對外保持 7689 對應 .env）
      - "7475:7474"   # HTTP Browser
    environment:
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_AUTH: neo4j/kg_test_2024
    volumes:
      # 直接掛載 Neo4j Desktop 的 DBMS 資料目錄（啟動前需確保 Desktop Neo4j 已停止）
      - C:/Users/666/.Neo4jDesktop/relate-data/dbmss/dbms-8fbe2ff4-fb91-402c-bbb4-746fefe1cd5f/data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s
    restart: unless-stopped

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kg-api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # 覆蓋 .env 中的 localhost 連線，改為 Docker 網路名稱
      NEO4J_URI: bolt://neo4j:7687
      # Ollama 留在 Windows 主機，透過 host.docker.internal 訪問
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      # 禁止 HuggingFace 啟動時 HEAD 請求（模型已快取，省去網路延遲）
      TRANSFORMERS_OFFLINE: "1"
      HF_DATASETS_OFFLINE: "1"
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./workspace:/app/workspace
      # 若需要讀取文件目錄，可依實際路徑調整
      # - D:/666/Downloads:/mnt/docs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
