name: kg

services:

  # ── Neo4j Enterprise（掛載現有資料，避免重新建立）──────────────────────────
  neo4j:
    image: neo4j:5.26-enterprise
    container_name: kg-neo4j
    ports:
      - "7689:7687"   # Bolt（對外保持 7689 對應 .env）
      - "7475:7474"   # HTTP Browser
    environment:
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-knowledge123}
    volumes:
      - neo4j_data:/data
      # 若要掛載 Neo4j Desktop 現有資料，改用以下設定（停止 Desktop DBMS 後再啟動）：
      # - /path/to/neo4j-desktop-dbms/data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s
    restart: unless-stopped

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kg-api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # 覆蓋 .env 中的 localhost 連線，改為 Docker 網路名稱
      NEO4J_URI: bolt://neo4j:7687
      # Ollama 留在 Windows 主機，透過 host.docker.internal 訪問
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      # 禁止 HuggingFace 啟動時 HEAD 請求（模型已快取，省去網路延遲）
      TRANSFORMERS_OFFLINE: "1"
      HF_DATASETS_OFFLINE: "1"
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./workspace:/app/workspace
      - ${USERPROFILE}/.cache/huggingface:/root/.cache/huggingface:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ── World Agent 獨立服務（port 8001）────────────────────────────────────────
  world:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kg-world
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      TRANSFORMERS_OFFLINE: "1"
      HF_DATASETS_OFFLINE: "1"
    command: ["uvicorn", "world_main:app", "--host", "0.0.0.0", "--port", "8001"]
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./workspace:/app/workspace
      - ${USERPROFILE}/.cache/huggingface:/root/.cache/huggingface:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  neo4j_data:
