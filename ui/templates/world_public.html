<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>世界知識助手</title>
<style>
/* ── Theme Variables ── */
:root {
  --bg: #f5f6fa; --bg-card: #ffffff; --bg-navbar: #2d3436;
  --text: #2d3436; --text-muted: #636e72; --text-faint: #b2bec3;
  --border: #dfe6e9; --border-light: #f5f5f5;
  --bg-secondary: #f0f3f5; --bg-secondary-hover: #dfe6e9;
  --bg-hover: #f5f6fa; --bg-stat: #f8f9ff;
  --bg-tag: #eff8ff; --border-tag: #d6eaf8;
  --bg-routing: #f3f0ff; --border-routing: #d1c4e9;
  --bg-svo: #e8f5e9; --border-svo: #c8e6c9; --bg-svo-list: #f9fff9;
  --bg-ai-bubble: #ffffff; --bg-input: #ffffff;
  --shadow-sm: rgba(0,0,0,0.06); --shadow-md: rgba(0,0,0,0.08);
  --shadow-toast: rgba(0,0,0,0.15);
}
html.dark {
  --bg: #0f0f1a; --bg-card: #1a1a2e; --bg-navbar: #0d0d1a;
  --text: #e2e8f0; --text-muted: #8892a4; --text-faint: #4a5568;
  --border: #2d2d4e; --border-light: #252540;
  --bg-secondary: #252540; --bg-secondary-hover: #2d2d4e;
  --bg-hover: #1e1e30; --bg-stat: #1e1e30;
  --bg-tag: #1a2744; --border-tag: #1e3a5f;
  --bg-routing: #1e1a30; --border-routing: #3a2d5c;
  --bg-svo: #1a2e1e; --border-svo: #1e3a22; --bg-svo-list: #141e14;
  --bg-ai-bubble: #1e1e30; --bg-input: #1a1a2e;
  --shadow-sm: rgba(0,0,0,0.3); --shadow-md: rgba(0,0,0,0.3);
  --shadow-toast: rgba(0,0,0,0.5);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; transition: background-color 0.2s, color 0.2s; }

/* ── Navbar ── */
.navbar { background: var(--bg-navbar); color: white; padding: 0 16px; display: flex; align-items: center; gap: 10px; height: 52px; flex-shrink: 0; }
.navbar h1 { font-size: 1.05rem; font-weight: 600; }
.navbar .subtitle { font-size: 0.76rem; color: #b2bec3; margin-left: auto; }
.theme-toggle { background: none; border: none; cursor: pointer; font-size: 1.05rem; padding: 5px 7px; border-radius: 6px; color: white; line-height: 1; transition: background 0.15s; flex-shrink: 0; }
.theme-toggle:hover { background: rgba(255,255,255,0.12); }

/* ── Buttons ── */
.btn { padding: 8px 14px; border: none; border-radius: 7px; font-size: 0.85rem; cursor: pointer; font-weight: 500; transition: all 0.15s; }
.btn-secondary { background: var(--bg-secondary); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--bg-secondary-hover); }
.btn-purple { background: #6c5ce7; color: white; }
.btn-purple:hover { background: #5a4ad1; }
.btn-sm { padding: 5px 10px; font-size: 0.78rem; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── Form ── */
.form-input { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.86rem; outline: none; transition: border-color 0.15s; font-family: inherit; background: var(--bg-input); color: var(--text); }
.form-input::placeholder { color: var(--text-faint); }
.form-input:focus { border-color: #0984e3; }

/* ── World layout ── */
.world-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.world-header { display: flex; align-items: center; gap: 10px; padding: 10px 18px; border-bottom: 1px solid var(--border); background: var(--bg-card); flex-shrink: 0; }
.world-title { font-size: 1rem; font-weight: 700; }
.world-stat-pill { background: var(--bg-stat); border: 1px solid var(--border); border-radius: 20px; padding: 2px 10px; font-size: 0.74rem; color: var(--text-muted); }
.world-body { flex: 1; display: flex; overflow: hidden; }
.world-kg-panel { width: 210px; border-right: 1px solid var(--border); overflow-y: auto; padding: 10px; flex-shrink: 0; }
.world-kg-panel h4 { font-size: 0.68rem; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); margin-bottom: 6px; font-weight: 600; }

/* ── Instance card ── */
.instance-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; margin-bottom: 10px; }
.instance-header { display: flex; align-items: center; gap: 7px; margin-bottom: 6px; }
.instance-dot { width: 8px; height: 8px; border-radius: 50%; background: #00b894; flex-shrink: 0; box-shadow: 0 0 6px #00b89480; }
.instance-id { font-size: 0.85rem; font-weight: 700; flex: 1; }
.instance-badge { font-size: 0.62rem; padding: 1px 7px; border-radius: 8px; background: var(--bg-svo); color: #2e7d32; border: 1px solid var(--border-svo); white-space: nowrap; }
html.dark .instance-badge { color: #4ade80; }
.instance-row { display: flex; align-items: baseline; gap: 6px; font-size: 0.72rem; padding: 2px 0; border-bottom: 1px solid var(--border-light); }
.instance-row:last-child { border: none; }
.instance-label { color: var(--text-faint); flex-shrink: 0; min-width: 40px; }
.instance-value { color: var(--text-muted); flex: 1; word-break: break-all; }
.instance-sync-badge { font-size: 0.6rem; padding: 0 5px; border-radius: 6px; margin-left: 4px; }
.sync-off { background: var(--bg-secondary); color: var(--text-faint); }
.sync-on { background: #e8f5e9; color: #00b894; }
html.dark .sync-on { background: #1a3a2a; }
.instance-stats { display: flex; gap: 6px; margin-top: 7px; padding-top: 7px; border-top: 1px solid var(--border-light); }
.istat { flex: 1; text-align: center; }
.istat-num { font-size: 1rem; font-weight: 700; color: var(--text); line-height: 1.2; }
.istat-label { font-size: 0.58rem; color: var(--text-faint); }

/* ── Sub-layer KG cards ── */
.world-kg-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; margin-bottom: 5px; cursor: pointer; transition: border-color .15s; position: relative; }
.world-kg-card:hover, .world-kg-card.active { border-color: #6c5ce7; background: var(--bg-routing); }
.world-kg-card::before { content: '▸'; position: absolute; left: -12px; top: 50%; transform: translateY(-50%); color: var(--border); font-size: 0.6rem; }
.world-kg-card-name { font-size: 0.82rem; font-weight: 600; margin-bottom: 3px; }
.world-kg-card-desc { font-size: 0.68rem; color: var(--text-muted); margin-bottom: 5px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.world-kg-card-db { font-size: 0.62rem; color: var(--text-faint); margin-bottom: 4px; font-family: monospace; }
.world-kg-card-stats { display: flex; gap: 5px; flex-wrap: wrap; }
.world-kg-stat { font-size: 0.64rem; color: var(--text-muted); background: var(--bg-secondary); border-radius: 8px; padding: 1px 5px; white-space: nowrap; }
.sublayer-tree { border-left: 1.5px solid var(--border); margin-left: 8px; padding-left: 14px; }
.world-right { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.world-sub-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--bg-card); flex-shrink: 0; }
.world-sub-tab { padding: 8px 16px; font-size: 0.82rem; cursor: pointer; color: var(--text-muted); border-bottom: 2px solid transparent; transition: all .15s; }
.world-sub-tab.active { color: #6c5ce7; border-bottom-color: #6c5ce7; font-weight: 600; }
.world-chat-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.world-chat-history { flex: 1; overflow-y: auto; padding: 18px 22px; display: flex; flex-direction: column; gap: 18px; }
.world-chat-input-bar { display: flex; gap: 8px; padding: 10px 16px; border-top: 1px solid var(--border); background: var(--bg-card); flex-shrink: 0; }
.world-explore-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 14px 18px; gap: 10px; }
.world-explore-search { display: flex; gap: 8px; flex-shrink: 0; }
.world-explore-results { flex: 1; overflow-y: auto; }

/* ── Chat messages ── */
.chat-welcome { text-align: center; padding: 50px 20px 20px; color: var(--text-muted); }
.chat-welcome .icon { font-size: 2.8rem; margin-bottom: 10px; }
.chat-welcome h2 { font-size: 1.15rem; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.chat-welcome p { font-size: 0.86rem; line-height: 1.6; max-width: 380px; margin: 0 auto; }
.msg-row { display: flex; gap: 8px; align-items: flex-start; }
.msg-row.user { flex-direction: row-reverse; }
.msg-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.95rem; flex-shrink: 0; }
.msg-avatar.ai { background: #6c5ce7; }
.msg-avatar.user { background: #0984e3; }
.msg-body { max-width: 74%; }
.msg-row.user .msg-body { align-items: flex-end; display: flex; flex-direction: column; }
.msg-routing { background: var(--bg-routing); border: 1px solid var(--border-routing); border-radius: 8px; padding: 7px 10px; margin-bottom: 5px; font-size: 0.78rem; }
.msg-routing-label { color: #7c5cbf; font-weight: 600; margin-bottom: 4px; }
.msg-routing-kgs { display: flex; flex-wrap: wrap; gap: 4px; }
.kg-route-chip { background: #ede7f6; color: #6c5ce7; padding: 2px 8px; border-radius: 8px; font-size: 0.74rem; font-weight: 500; }
html.dark .kg-route-chip { background: #2d1f5e; color: #a78bfa; }
.msg-svo { margin-bottom: 5px; }
.svo-toggle { background: var(--bg-svo); border: 1px solid var(--border-svo); border-radius: 7px; padding: 5px 10px; font-size: 0.76rem; color: #2e7d32; cursor: pointer; display: flex; align-items: center; gap: 6px; user-select: none; }
html.dark .svo-toggle { color: #4ade80; }
.svo-toggle:hover { background: var(--border-svo); }
.svo-list { background: var(--bg-svo-list); border: 1px solid var(--border-svo); border-radius: 0 0 7px 7px; border-top: none; padding: 6px 10px; max-height: 120px; overflow-y: auto; display: none; }
.svo-list.open { display: block; }
.svo-fact { font-size: 0.76rem; color: var(--text); padding: 1px 0; }
.svo-fact::before { content: '•'; color: #27ae60; margin-right: 5px; }
.msg-bubble { padding: 10px 14px; border-radius: 14px; font-size: 0.88rem; line-height: 1.7; white-space: pre-wrap; word-break: break-word; }
.msg-row.ai .msg-bubble { background: var(--bg-ai-bubble); border: 1px solid var(--border); border-top-left-radius: 4px; }
.msg-row.user .msg-bubble { background: #0984e3; color: white; border-top-right-radius: 4px; }
.msg-status { font-size: 0.76rem; color: var(--text-faint); font-style: italic; }
.msg-sources { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.source-chip { background: #e8eaf6; color: #5c6bc0; font-size: 0.7rem; padding: 3px 8px; border-radius: 9px; }
html.dark .source-chip { background: #1e2050; color: #818cf8; }
.source-score { opacity: 0.7; font-size: 0.66rem; margin-left: 2px; }
.cursor { display: inline-block; width: 2px; height: 1em; background: #6c5ce7; margin-left: 2px; animation: blink 0.8s step-end infinite; vertical-align: text-bottom; }
@keyframes blink { 50% { opacity: 0; } }
.chat-input { flex: 1; padding: 9px 12px; border: 2px solid var(--border); border-radius: 10px; font-size: 0.88rem; resize: none; outline: none; font-family: inherit; line-height: 1.5; max-height: 120px; overflow-y: auto; transition: border-color 0.15s; background: var(--bg-input); color: var(--text); }
.chat-input::placeholder { color: var(--text-faint); }
.chat-input:focus { border-color: #6c5ce7; }

/* ── Provenance ── */
.msg-provenance { margin-top: 6px; }
.prov-toggle { display: flex; align-items: center; gap: 6px; font-size: 0.74rem; color: var(--text-muted); cursor: pointer; padding: 3px 0; }
.prov-toggle:hover { color: #6c5ce7; }
.prov-list { display: none; margin-top: 4px; background: var(--bg-secondary); border-radius: 6px; padding: 6px 8px; }
.prov-list.open { display: block; }
.prov-cite { display: flex; align-items: center; gap: 6px; font-size: 0.74rem; padding: 3px 0; border-bottom: 1px solid var(--border-light); }
.prov-cite:last-child { border: none; }
.prov-cite-title { flex: 1; }
.prov-cite-count { font-size: 0.68rem; color: #6c5ce7; background: var(--bg-tag); padding: 1px 5px; border-radius: 8px; }
.msg-shard { margin-bottom: 5px; font-size: 0.72rem; }
.shard-pills { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.shard-pill { font-size: 0.66rem; padding: 1px 7px; border-radius: 8px; border: 1px solid var(--border); }
.shard-pill.ok { color: #00b894; border-color: #00b894; }
.shard-pill.timeout, .shard-pill.offline { color: #d63031; border-color: #d63031; }
.shard-pill.error { color: #e17055; border-color: #e17055; }

/* ── Entity explorer ── */
.entity-card { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 7px; border: 1px solid var(--border); margin-bottom: 5px; cursor: pointer; transition: border-color .15s; background: var(--bg-card); }
.entity-card:hover { border-color: #6c5ce7; }
.entity-name { font-size: 0.84rem; font-weight: 500; flex: 1; }
.entity-type-tag { font-size: 0.68rem; padding: 1px 6px; border-radius: 8px; background: var(--bg-tag); color: #0984e3; }
.entity-kg-tag { font-size: 0.68rem; color: var(--text-muted); }
.neighbor-panel { background: var(--bg-secondary); border-radius: 8px; padding: 10px 12px; margin-top: 6px; }
.neighbor-panel h4 { font-size: 0.78rem; font-weight: 600; margin-bottom: 6px; }
.neighbor-edge { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; padding: 3px 0; border-bottom: 1px solid var(--border-light); }
.neighbor-verb { color: #6c5ce7; font-style: italic; min-width: 100px; font-size: 0.74rem; }

/* ── Graph ── */
.graph-view-toggle { display: flex; gap: 4px; margin-left: auto; flex-shrink: 0; }
.graph-toggle-btn { padding: 2px 10px; font-size: 0.76rem; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; background: var(--bg-card); color: var(--text-muted); transition: all .15s; }
.graph-toggle-btn.active { background: #6c5ce7; color: white; border-color: #6c5ce7; }
.graph-canvas-wrap { flex: 1; position: relative; overflow: hidden; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-card); }
.graph-canvas-wrap svg { width: 100%; height: 100%; display: block; }
.graph-tooltip { position: absolute; background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-size: 0.76rem; pointer-events: none; box-shadow: 0 2px 8px var(--shadow-md); z-index: 100; max-width: 220px; line-height: 1.5; }
.graph-tooltip .gt-name { font-weight: 600; word-break: break-all; }
.graph-tooltip .gt-type { color: var(--text-muted); font-size: 0.7rem; }
.graph-tooltip .gt-hint { font-size: 0.65rem; color: var(--text-faint); margin-top: 2px; }
.graph-legend { position: absolute; bottom: 8px; left: 10px; display: flex; flex-wrap: wrap; gap: 5px; pointer-events: none; }
.graph-legend-item { display: flex; align-items: center; gap: 3px; font-size: 0.65rem; color: var(--text-muted); }
.graph-legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.graph-controls { position: absolute; top: 8px; right: 10px; display: flex; gap: 4px; }
.graph-ctrl-btn { background: var(--bg-card); border: 1px solid var(--border); border-radius: 5px; padding: 2px 7px; font-size: 0.72rem; cursor: pointer; color: var(--text-muted); transition: all .15s; }
.graph-ctrl-btn:hover { background: var(--bg-secondary); }

/* ── Shared ── */
.empty-state { text-align: center; padding: 50px 20px; color: var(--text-faint); }
.empty-icon { font-size: 2.5rem; margin-bottom: 8px; }
.empty-state p { font-size: 0.85rem; }
.loading { text-align: center; padding: 36px; color: var(--text-faint); }
.spinner { border: 3px solid var(--border); border-top-color: #0984e3; border-radius: 50%; width: 26px; height: 26px; animation: spin 0.8s linear infinite; margin: 0 auto 9px; }
@keyframes spin { to { transform: rotate(360deg); } }
.toast { position: fixed; top: 14px; right: 14px; padding: 10px 14px; border-radius: 7px; font-size: 0.83rem; z-index: 200; animation: slideIn 0.2s ease; box-shadow: 0 4px 12px var(--shadow-toast); }
.toast.success { background: #00b894; color: white; }
.toast.error { background: #d63031; color: white; }
@keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="navbar">
  <span style="font-size:1.3rem">🌐</span>
  <h1>世界知識助手</h1>
  <span class="subtitle" id="stats-summary">載入中…</span>
  <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">🌙</button>
</div>

<div class="world-wrap">
  <div class="world-header">
    <span class="world-stat-pill" id="world-stat-kgs">公開 KG: -</span>
    <span class="world-stat-pill" id="world-stat-entities">實體: -</span>
    <span class="world-stat-pill" id="world-stat-relations">關係: -</span>
    <button class="btn btn-sm btn-secondary" style="margin-left:auto" onclick="loadWorldTab()">重新整理</button>
  </div>
  <div class="world-body">
    <!-- Left: Instance topology + sub-layers -->
    <div class="world-kg-panel">
      <h4>知識來源</h4>
      <div id="instance-card"><div class="loading"><div class="spinner"></div></div></div>
      <h4 style="margin-top:10px">知識子層</h4>
      <div class="sublayer-tree" id="world-kg-list">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
    <!-- Right: Chat + Explore -->
    <div class="world-right">
      <div class="world-sub-tabs">
        <div class="world-sub-tab active" onclick="switchWorldSubTab('chat',this)">💬 世界問答</div>
        <div class="world-sub-tab" onclick="switchWorldSubTab('explore',this)">🔭 實體探索</div>
      </div>
      <!-- World Chat -->
      <div id="world-sub-chat" class="world-chat-wrap">
        <div class="world-chat-history" id="world-chat-history">
          <div class="chat-welcome">
            <div class="icon">🌐</div>
            <h2>世界知識助手</h2>
            <p>向我提問，我會橫跨所有公開知識庫，整合 SVO 知識事實與文件回答。</p>
          </div>
        </div>
        <div class="world-chat-input-bar">
          <textarea class="chat-input" id="world-chat-input" placeholder="向所有公開知識庫提問…" rows="1" style="flex:1"></textarea>
          <button class="btn btn-purple" id="world-send-btn" onclick="doWorldChat()">送出</button>
        </div>
      </div>
      <!-- Entity Explorer -->
      <div id="world-sub-explore" class="world-explore-panel" style="display:none">
        <div class="world-explore-search">
          <input class="form-input" id="entity-search-input" placeholder="輸入實體名稱關鍵字…" style="flex:1"
                 onkeydown="if(event.key==='Enter')exploreEntities()">
          <button class="btn btn-purple btn-sm" onclick="exploreEntities()">搜尋</button>
          <button class="btn btn-secondary btn-sm" onclick="exploreEntities('')">全部高頻</button>
          <div class="graph-view-toggle">
            <button class="graph-toggle-btn active" id="explore-list-btn" onclick="switchExploreView('list')">≡ 列表</button>
            <button class="graph-toggle-btn" id="explore-graph-btn" onclick="switchExploreView('graph')">◎ 圖形</button>
          </div>
        </div>
        <div class="world-explore-results" id="entity-results">
          <div class="empty-state"><div class="empty-icon">🔭</div><p>搜尋實體，或點擊「全部高頻」查看關係最多的實體</p></div>
        </div>
        <div class="graph-canvas-wrap" id="graph-canvas-wrap" style="display:none">
          <div class="graph-tooltip" id="graph-tooltip" style="display:none"></div>
          <div class="graph-legend" id="graph-legend"></div>
          <div class="graph-controls">
            <button class="graph-ctrl-btn" onclick="graphResetZoom()" title="重置縮放">⊙ 重置</button>
            <button class="graph-ctrl-btn" onclick="graphClear()" title="清除圖形">✕ 清除</button>
          </div>
          <svg id="graph-svg"></svg>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script>
const API = '';

// ── Theme ────────────────────────────────────────────────────────────────────
(function() {
  const saved = localStorage.getItem('theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  if (saved === 'dark' || (!saved && prefersDark)) document.documentElement.classList.add('dark');
  document.getElementById('theme-toggle').textContent = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
})();

function toggleTheme() {
  const isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
  document.getElementById('theme-toggle').textContent = isDark ? '☀️' : '🌙';
}

// ── Utilities ────────────────────────────────────────────────────────────────
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg, type='success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ── Sub-tab switching ─────────────────────────────────────────────────────────
function switchWorldSubTab(name, el) {
  document.querySelectorAll('.world-sub-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('world-sub-chat').style.display    = name === 'chat'    ? 'flex' : 'none';
  document.getElementById('world-sub-explore').style.display = name === 'explore' ? 'flex' : 'none';
}

// ── World Tab init ────────────────────────────────────────────────────────────
async function loadWorldTab() {
  try {
    const [statsRes, instRes] = await Promise.all([
      fetch(`${API}/world/stats`),
      fetch(`${API}/world/instance`),
    ]);
    const stats = await statsRes.json();
    const inst  = await instRes.json();

    // ── 頂部統計條 ──
    document.getElementById('world-stat-kgs').textContent       = `子層: ${inst.sub_layers.length}`;
    document.getElementById('world-stat-entities').textContent  = `實體: ${stats.total_entities.toLocaleString()}`;
    document.getElementById('world-stat-relations').textContent = `關係: ${stats.total_relations.toLocaleString()}`;
    document.getElementById('stats-summary').textContent =
      `${inst.instance_id} · ${inst.neo4j_display} · ${inst.sub_layers.length} 個知識子層`;

    // ── 實例卡片 ──
    const totalEntities  = inst.sub_layers.reduce((s, kg) => s + (kg.entity_count || 0), 0);
    const totalRelations = inst.sub_layers.reduce((s, kg) => s + (kg.relation_count || 0), 0);
    const syncBadge = inst.sync.enabled
      ? `<span class="instance-sync-badge sync-on">● 同步已啟用</span>`
      : `<span class="instance-sync-badge sync-off">○ 本機模式</span>`;

    document.getElementById('instance-card').innerHTML = `
      <div class="instance-card">
        <div class="instance-header">
          <div class="instance-dot"></div>
          <div class="instance-id">${esc(inst.instance_id)}</div>
          <div class="instance-badge">唯讀</div>
        </div>
        <div class="instance-row">
          <span class="instance-label">資料庫</span>
          <span class="instance-value">${esc(inst.neo4j_display)}</span>
        </div>
        <div class="instance-row">
          <span class="instance-label">管道</span>
          <span class="instance-value">${esc(inst.pipeline)} ${syncBadge}</span>
        </div>
        <div class="instance-row">
          <span class="instance-label">子層</span>
          <span class="instance-value">${inst.sub_layers.length} 個知識庫</span>
        </div>
        <div class="instance-stats">
          <div class="istat">
            <div class="istat-num">${totalEntities.toLocaleString()}</div>
            <div class="istat-label">實體</div>
          </div>
          <div class="istat">
            <div class="istat-num">${totalRelations.toLocaleString()}</div>
            <div class="istat-label">關係</div>
          </div>
        </div>
      </div>`;

    // ── 子層 KG 卡片 ──
    const listEl = document.getElementById('world-kg-list');
    if (!inst.sub_layers.length) {
      listEl.innerHTML = '<p style="font-size:0.78rem;color:var(--text-muted)">尚無公開知識庫</p>';
      return;
    }
    listEl.innerHTML = inst.sub_layers.map(kg => `
      <div class="world-kg-card" onclick="filterExploreByKg('${kg.id}')">
        <div class="world-kg-card-name">${esc(kg.name)}</div>
        ${kg.description ? `<div class="world-kg-card-desc">${esc(kg.description)}</div>` : ''}
        <div class="world-kg-card-db">db: ${esc(kg.db_name)}</div>
        <div class="world-kg-card-stats">
          <span class="world-kg-stat">🔗 ${(kg.entity_count||0).toLocaleString()} 實體</span>
          <span class="world-kg-stat">↔ ${(kg.relation_count||0).toLocaleString()} 關係</span>
        </div>
      </div>`).join('');
  } catch(e) {
    document.getElementById('instance-card').innerHTML = '<p style="font-size:0.78rem;color:#d63031">載入失敗</p>';
    document.getElementById('stats-summary').textContent = '無法連線';
  }
}

document.getElementById('world-chat-input').addEventListener('keydown', e => {

        <div class="msg-routing-label">公開 KG：</div>
        <div class="msg-routing-kgs" id="${uid}-kgs"></div>
      </div>
      <div class="msg-svo" id="${uid}-svo" style="display:none">
        <div class="svo-toggle" onclick="toggleSvo('${uid}')">
          <span>🧠</span>
          <span id="${uid}-svo-count">知識事實 0 條</span>
          <span style="margin-left:auto;font-size:0.7rem" id="${uid}-svo-arrow">▸ 展開</span>

}

function toggleProv(uid) {
  const list = document.getElementById(uid + '-prov-list');
  const arrow = document.getElementById(uid + '-prov-arrow');
  const open = list.classList.toggle('open');
  if (arrow) arrow.textContent = open ? '▾ 收合' : '▸ 展開';
}

function setKgRoute(uid, kgs) {
  if (!kgs || !kgs.length) return;
  const panel = document.getElementById(uid + '-routing');
  const kgsEl = document.getElementById(uid + '-kgs');
  panel.style.display = 'block';
  kgsEl.innerHTML = kgs.map(k =>
    `<span class="kg-route-chip">${esc(k.name)} <span style="opacity:.7">${Math.round(k.score*100)}%</span></span>`
  ).join('');
}

function setSvoFacts(uid, facts) {
  if (!facts || !facts.length) return;
  const panel = document.getElementById(uid + '-svo');
  const list  = document.getElementById(uid + '-svo-list');
  const count = document.getElementById(uid + '-svo-count');
  panel.style.display = 'block';
  count.textContent = `知識事實 ${facts.length} 條`;
  list.innerHTML = facts.map(f => `<div class="svo-fact">${esc(f)}</div>`).join('');
}

function setShardMeta(uid, meta, offline) {
  const el = document.getElementById(uid + '-shard');
  if (!el) return;
  const pills = meta.map(s => `<span class="shard-pill ${s.status}" title="${esc(s.instance_id)}: ${s.facts} facts, ${s.elapsed_ms}ms">${esc(s.name)}</span>`).join('');
  el.style.display = 'block';
  el.innerHTML = `<div style="font-size:0.7rem;color:var(--text-muted);margin-bottom:3px">分片查詢 ${meta.length} 個${offline.length ? `，離線 ${offline.length} 個` : ''}：</div><div class="shard-pills">${pills}</div>`;
}

function setProvenance(uid, citations) {
  const el = document.getElementById(uid + '-prov');
  const list = document.getElementById(uid + '-prov-list');
  const label = document.getElementById(uid + '-prov-label');
  if (!el || !list || !citations.length) return;
  label.textContent = `來源引用（${citations.length} 份文件）`;
  list.innerHTML = citations.map(c =>
    `<div class="prov-cite"><span class="prov-cite-title">📄 ${esc(c.title || c.doc_id)}</span><span class="prov-cite-count">${c.fact_count} 條事實</span></div>`
  ).join('');
  el.style.display = 'block';
}

function renderSources(uid, sources) {
  if (!sources || !sources.length) return;
  const el = document.getElementById(uid + '-sources');
  el.innerHTML = sources.map(s => {
    const pct = Math.round(s.score * 100);
    return `<span class="source-chip">${esc(s.title)} <span class="source-score">${pct}%</span></span>`;
  }).join('');
}

async function doWorldChat() {
  if (isWorldStreaming) return;
  const question = document.getElementById('world-chat-input').value.trim();
  if (!question) return;

  const welcome = document.querySelector('#world-chat-history .chat-welcome');
  if (welcome) welcome.remove();

  const h = document.getElementById('world-chat-history');
  const userRow = document.createElement('div');
  userRow.className = 'msg-row user';
  userRow.innerHTML = `<div class="msg-avatar user">👤</div><div class="msg-body"><div class="msg-bubble">${esc(question)}</div></div>`;
  h.appendChild(userRow); h.scrollTop = h.scrollHeight;

  document.getElementById('world-chat-input').value = '';
  document.getElementById('world-chat-input').style.height = 'auto';

  const uid = appendWorldAiMsg();
  isWorldStreaming = true;
  document.getElementById('world-send-btn').disabled = true;
  const bubble = document.getElementById(uid + '-bubble');
  let fullText = '';

  try {
    const res = await fetch(`${API}/world/chat`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({question, top_k: 3, max_chars_per_doc: 1500, use_svo: true}),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, {stream:true});
      const parts = buf.split('\n\n'); buf = parts.pop();
      for (const part of parts) {
        const line = part.trim();
        if (!line.startsWith('data:')) continue;
        let evt; try { evt = JSON.parse(line.slice(5).trim()); } catch { continue; }

        if (evt.status === 'searching') {
          bubble.innerHTML = '<span class="msg-status">🔍 路由公開知識庫中…</span><span class="cursor"></span>';
        } else if (evt.kg_route) {
          setKgRoute(uid, evt.kg_route);
          bubble.innerHTML = '<span class="msg-status">🧠 提取知識事實…</span><span class="cursor"></span>';
        } else if (evt.shard_meta) {
          setShardMeta(uid, evt.shard_meta, evt.shards_offline || []);
        } else if (evt.svo_facts) {
          setSvoFacts(uid, evt.svo_facts);
          bubble.innerHTML = '<span class="msg-status">📄 比對文件…</span><span class="cursor"></span>';
        } else if (evt.provenance) {
          setProvenance(uid, evt.provenance);
        } else if (evt.sources) {
          renderSources(uid, evt.sources);
        } else if (evt.status === 'generating') {
          bubble.innerHTML = '<span class="cursor"></span>';
        } else if (evt.token) {
          fullText += evt.token;
          bubble.textContent = fullText;
          const cur = document.createElement('span'); cur.className = 'cursor';
          bubble.appendChild(cur);
          document.getElementById('world-chat-history').scrollTop = 999999;
        } else if (evt.done) {
          bubble.textContent = fullText;
        } else if (evt.error) {
          bubble.innerHTML = `<span style="color:#d63031">❌ ${esc(evt.error)}</span>`;
        }
      }
    }
    bubble.textContent = fullText || bubble.textContent;
  } catch(e) {
    bubble.innerHTML = `<span style="color:#d63031">❌ 連線失敗：${esc(e.message)}</span>`;
  } finally {
    isWorldStreaming = false;
    document.getElementById('world-send-btn').disabled = false;
    document.getElementById('world-chat-history').scrollTop = 999999;
  }
}

// ── Entity Explorer ───────────────────────────────────────────────────────────
const _TYPE_COLORS = {
  '算法':'#6c5ce7','Algorithm':'#6c5ce7','概念':'#0984e3','Concept':'#0984e3',
  '工具':'#00b894','Tool':'#00b894','資源':'#e17055','Resource':'#e17055',
  '系統':'#74b9ff','System':'#74b9ff','方法':'#fd79a8','Method':'#fd79a8',
  '模型':'#a29bfe','Model':'#a29bfe','框架':'#55efc4','Framework':'#55efc4',
};
const _TYPE_COLOR_DEFAULT = '#b2bec3';
function _nodeColor(type) { return _TYPE_COLORS[type] || _TYPE_COLOR_DEFAULT; }

let _gNodes = [], _gLinks = [], _gExpanded = new Set();
let _gSimulation = null, _gSvgRoot = null, _gSvgG = null, _gZoom = null;
let _gExploreView = 'list';

function switchExploreView(view) {
  _gExploreView = view;
  document.getElementById('entity-results').style.display    = view === 'list'  ? '' : 'none';
  document.getElementById('graph-canvas-wrap').style.display = view === 'graph' ? '' : 'none';
  document.getElementById('explore-list-btn').classList.toggle('active', view === 'list');
  document.getElementById('explore-graph-btn').classList.toggle('active', view === 'graph');
  if (view === 'graph') { _initGraph(); _renderGraph(); }
}

function _initGraph() {
  if (_gSvgRoot) return;
  const svg = d3.select('#graph-svg');
  _gSvgRoot = svg;
  svg.append('defs').append('marker')
    .attr('id','g-arrow').attr('viewBox','-0 -5 10 10')
    .attr('refX',18).attr('refY',0).attr('orient','auto')
    .attr('markerWidth',5).attr('markerHeight',5)
    .append('path').attr('d','M 0,-5 L 10,0 L 0,5').attr('fill','#b2bec3');
  _gZoom = d3.zoom().scaleExtent([0.15, 5])
    .on('zoom', e => _gSvgG && _gSvgG.attr('transform', e.transform));
  svg.call(_gZoom);
  _gSvgG = svg.append('g');
}

function graphResetZoom() {
  if (_gSvgRoot && _gZoom) _gSvgRoot.transition().duration(400).call(_gZoom.transform, d3.zoomIdentity);
}

function graphClear() {
  _gNodes = []; _gLinks = []; _gExpanded.clear();
  if (_gSimulation) { _gSimulation.stop(); _gSimulation = null; }
  _renderGraph();
}

function _renderGraph() {
  if (!_gSvgRoot) _initGraph();
  const wrap = document.getElementById('graph-canvas-wrap');
  const W = wrap.clientWidth || 700;
  const H = wrap.clientHeight || 450;
  _gSvgG.selectAll('*').remove();

  if (_gNodes.length === 0) {
    _gSvgG.append('text').attr('x', W/2).attr('y', H/2)
      .attr('text-anchor','middle').attr('fill','var(--text-muted)').attr('font-size','0.85rem')
      .text('搜尋實體後點擊「◎ 圖形」在此顯示知識圖譜');
    _updateLegend([]);
    return;
  }

  const idSet = new Set(_gNodes.map(n => n.id));
  const links = _gLinks.filter(l => {
    const s = typeof l.source === 'object' ? l.source.id : l.source;
    const t = typeof l.target === 'object' ? l.target.id : l.target;
    return idSet.has(s) && idSet.has(t);
  }).map(l => ({
    source: typeof l.source === 'object' ? l.source.id : l.source,
    target: typeof l.target === 'object' ? l.target.id : l.target,
    rel_type: l.rel_type, verb: l.verb,
  }));

  const edgeG = _gSvgG.append('g');
  const linkLines = edgeG.selectAll('line').data(links).enter().append('line')
    .attr('stroke','var(--border)').attr('stroke-width',1.4)
    .attr('marker-end','url(#g-arrow)');
  const linkLabels = edgeG.selectAll('text').data(links).enter().append('text')
    .attr('text-anchor','middle').attr('font-size','0.55rem')
    .attr('fill','var(--text-faint)').attr('pointer-events','none')
    .text(d => (d.verb && d.verb !== d.rel_type ? d.verb : d.rel_type) || '');

  const nodeG = _gSvgG.append('g');
  const drag = d3.drag()
    .on('start', (e,d) => { if(!e.active) _gSimulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on('drag',  (e,d) => { d.fx=e.x; d.fy=e.y; })
    .on('end',   (e,d) => { if(!e.active) _gSimulation.alphaTarget(0); d.fx=null; d.fy=null; });

  const nodeSel = nodeG.selectAll('g').data(_gNodes, d => d.id).enter().append('g')
    .attr('cursor','pointer').call(drag)
    .on('click', (e,d) => { e.stopPropagation(); _graphExpand(d); })
    .on('mouseover', (e,d) => _showTip(e,d))
    .on('mousemove', e => _moveTip(e))
    .on('mouseout', () => _hideTip());

  nodeSel.append('circle')
    .attr('r', d => _gExpanded.has(d.id) ? 16 : 11)
    .attr('fill', d => _nodeColor(d.type))
    .attr('stroke', 'var(--bg-card)').attr('stroke-width', 2.5)
    .attr('opacity', d => _gExpanded.has(d.id) ? 1 : 0.85);

  nodeSel.append('text')
    .attr('text-anchor','middle').attr('dy','0.35em')
    .attr('font-size','0.55rem').attr('fill','white').attr('pointer-events','none')
    .text(d => d.name.length > 7 ? d.name.slice(0,6)+'…' : d.name);

  if (_gSimulation) _gSimulation.stop();
  _gSimulation = d3.forceSimulation(_gNodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(100))
    .force('charge', d3.forceManyBody().strength(-220))
    .force('center', d3.forceCenter(W/2, H/2))
    .force('collide', d3.forceCollide(26))
    .on('tick', () => {
      linkLines
        .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
      linkLabels
        .attr('x', d => (d.source.x + d.target.x)/2)
        .attr('y', d => (d.source.y + d.target.y)/2 - 4);
      nodeSel.attr('transform', d => `translate(${d.x??0},${d.y??0})`);
    });

  _updateLegend([...new Set(_gNodes.map(n => n.type).filter(Boolean))]);
}

async function _graphExpand(node) {
  if (_gExpanded.has(node.id)) return;
  _gExpanded.add(node.id);
  try {
    const res = await fetch(`${API}/world/explore/neighbors?entity=${encodeURIComponent(node.name)}&kg_id=${node.kg_id}&limit=25`);
    const data = await res.json();
    if (!data.nodes || !data.edges.length) return;
    const existing = new Set(_gNodes.map(n => n.id));
    data.nodes.forEach(n => {
      const id = `${node.kg_id}::${n.id}`;
      if (!existing.has(id)) {
        _gNodes.push({ id, name: n.id, type: n.type || 'Entity', kg_id: node.kg_id, kg_name: node.kg_name });
        existing.add(id);
      }
    });
    const existLinks = new Set(_gLinks.map(l => {
      const s = typeof l.source==='object' ? l.source.id : l.source;
      const t = typeof l.target==='object' ? l.target.id : l.target;
      return `${s}→${t}→${l.rel_type}`;
    }));
    data.edges.forEach(e => {
      const src = `${node.kg_id}::${e.src}`;
      const tgt = `${node.kg_id}::${e.dst}`;
      const key = `${src}→${tgt}→${e.rel_type}`;
      if (!existLinks.has(key)) { _gLinks.push({ source:src, target:tgt, rel_type:e.rel_type, verb:e.verb }); existLinks.add(key); }
    });
    _renderGraph();
  } catch(err) { console.warn('graph expand error', err); }
}

function _updateLegend(types) {
  const el = document.getElementById('graph-legend');
  if (!el) return;
  el.innerHTML = types.slice(0,8).map(t =>
    `<div class="graph-legend-item"><div class="graph-legend-dot" style="background:${_nodeColor(t)}"></div>${esc(t)}</div>`
  ).join('');
}

function _showTip(e, d) {
  const t = document.getElementById('graph-tooltip');
  t.innerHTML = `<div class="gt-name">${esc(d.name)}</div>
    <div class="gt-type">${esc(d.type||'Entity')}${d.kg_name ? ' · '+esc(d.kg_name) : ''}</div>
    <div class="gt-hint">${_gExpanded.has(d.id) ? '已展開鄰居' : '點擊展開鄰居'}</div>`;
  t.style.display = '';
  _moveTip(e);
}
function _moveTip(e) {
  const wrap = document.getElementById('graph-canvas-wrap');
  const rect = wrap.getBoundingClientRect();
  const t = document.getElementById('graph-tooltip');
  t.style.left = (e.clientX - rect.left + 14) + 'px';
  t.style.top  = (e.clientY - rect.top  - 12) + 'px';
}
function _hideTip() { document.getElementById('graph-tooltip').style.display = 'none'; }

async function exploreEntities(q) {
  const query = q !== undefined ? q : document.getElementById('entity-search-input').value.trim();
  const el = document.getElementById('entity-results');
  el.innerHTML = '<div class="loading"><div class="spinner"></div><p>搜尋中…</p></div>';
  try {
    const res = await fetch(`${API}/world/explore/entities?q=${encodeURIComponent(query)}&limit=40`);
    const data = await res.json();
    if (!data.entities.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>找不到符合的實體</p></div>';
      return;
    }
    el.innerHTML = data.entities.map(e => `
      <div class="entity-card" onclick="exploreNeighbors('${esc(e.name)}','${e.kg_id}','${esc(e.kg_name)}');graphSeedEntities([{name:'${esc(e.name)}',type:'${esc(e.type||'Entity')}',kg_id:'${e.kg_id}',kg_name:'${esc(e.kg_name)}'}])">
        <span class="entity-name">${esc(e.name)}</span>
        <span class="entity-type-tag">${esc(e.type || 'Entity')}</span>
        <span class="entity-kg-tag">${esc(e.kg_name)}</span>
        <span style="font-size:0.7rem;color:var(--text-faint)">↔${e.degree}</span>
      </div>`).join('');

    _gNodes = []; _gLinks = []; _gExpanded.clear();
    data.entities.forEach(e => {
      _gNodes.push({ id:`${e.kg_id}::${e.name}`, name:e.name, type:e.type||'Entity', kg_id:e.kg_id, kg_name:e.kg_name||'' });
    });
    if (_gExploreView === 'graph') _renderGraph();
  } catch(e) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><p>搜尋失敗</p></div>';
  }
}

function graphSeedEntities(entities) {
  entities.forEach(e => {
    const id = `${e.kg_id}::${e.name}`;
    if (!_gNodes.find(n => n.id === id)) {
      _gNodes.push({ id, name: e.name, type: e.type, kg_id: e.kg_id, kg_name: e.kg_name || '' });
    }
  });
  if (_gExploreView === 'graph') _renderGraph();
}

let _neighborEl = null;

async function exploreNeighbors(entityName, kgId, kgName) {
  if (_neighborEl && _neighborEl.dataset.entity === entityName) {
    _neighborEl.remove(); _neighborEl = null; return;
  }
  if (_neighborEl) { _neighborEl.remove(); _neighborEl = null; }

  const cards = document.getElementById('entity-results');
  const panel = document.createElement('div');
  panel.className = 'neighbor-panel';
  panel.dataset.entity = entityName;
  panel.innerHTML = `<h4>🔭 ${esc(entityName)} <span style="font-weight:400;color:var(--text-muted)">（${esc(kgName)}）</span></h4><div class="loading" style="padding:8px 0"><div class="spinner"></div></div>`;
  cards.insertAdjacentElement('afterbegin', panel);
  _neighborEl = panel;

  try {
    const res = await fetch(`${API}/world/explore/neighbors?entity=${encodeURIComponent(entityName)}&kg_id=${kgId}&limit=30`);
    const data = await res.json();
    if (data.error || !data.edges.length) {
      panel.innerHTML = `<h4>🔭 ${esc(entityName)}</h4><p style="font-size:0.78rem;color:var(--text-muted)">無關係資料</p>`;
      return;
    }
    const edgesHtml = data.edges.map(e => `
      <div class="neighbor-edge">
        <span style="font-weight:500">${esc(e.src === entityName ? '' : e.src)}</span>
        <span class="neighbor-verb">[${esc(e.rel_type)}] ${esc(e.verb !== e.rel_type ? e.verb : '')}</span>
        <span style="flex:1">${esc(e.src === entityName ? e.dst : e.src)}</span>
        <span style="font-size:0.68rem;color:var(--text-faint);cursor:pointer" onclick="exploreNeighbors('${esc(e.src === entityName ? e.dst : e.src)}','${kgId}','${esc(kgName)}')">展開 ▸</span>
      </div>`).join('');
    panel.innerHTML = `
      <h4>🔭 ${esc(entityName)} <span style="font-weight:400;color:var(--text-muted)">（${esc(kgName)}，${data.edges.length} 條關係）</span>
        <span style="cursor:pointer;float:right;font-weight:400;color:var(--text-muted)" onclick="_neighborEl&&_neighborEl.remove();_neighborEl=null">✕</span>
      </h4>
      ${edgesHtml}`;
  } catch(e) {
    panel.innerHTML = `<h4>🔭 ${esc(entityName)}</h4><p style="color:#d63031;font-size:0.78rem">載入失敗</p>`;
  }
}

function filterExploreByKg(kgId) {
  switchWorldSubTab('explore', document.querySelectorAll('.world-sub-tab')[1]);
  document.getElementById('entity-search-input').value = '';
  exploreEntities('');
}

loadWorldTab();
</script>
